name: Run Monitoring Script


name: Run Monitoring Script

on:
  push:
    branches:
      - main

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show files
        run: ls -la

      - name: Make script executable
        run: chmod +x monitor.sh

      - name: Run script
        run: bash monitor.sh
